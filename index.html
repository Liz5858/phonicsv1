<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 신나는 파닉스 놀이 🎈</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Jua', sans-serif; background-color: #FFF6E9; text-align: center; margin: 0; padding: 40px 20px; color: #5D4037; }
        h1 { font-size: 3rem; color: #FF8A65; text-shadow: 2px 2px #FFE0B2; margin-bottom: 5px; }
        .container { background-color: #FFFFFF; border-radius: 30px; padding: 30px; max-width: 700px; margin: 0 auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px dashed #FFCCBC; }
        input[type="text"] { width: 85%; padding: 15px; font-size: 1.5rem; border: 3px solid #81D4FA; border-radius: 20px; outline: none; text-align: center; font-family: 'Jua', sans-serif; margin-bottom: 20px; }
        button.btn-main { background-color: #FFB74D; color: white; border: none; padding: 15px 30px; font-size: 1.5rem; border-radius: 25px; cursor: pointer; font-family: 'Jua', sans-serif; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(255, 183, 77, 0.4); }
        .result-area { margin-top: 30px; display: flex; flex-direction: column; gap: 20px; }
        .word-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; animation: popIn 0.5s ease-out; }
        .word-card { background-color: #F3E5F5; padding: 15px 25px; border-radius: 20px; font-size: 2.2rem; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; position: relative; }
        .phoneme { padding: 5px 12px; border-radius: 12px; background-color: white; border: 3px solid #ccc; display: inline-block; position: relative; }

        .vowel { border-color: #FF5252; color: #D50000; }
        .consonant { border-color: #4FC3F7; color: #0277BD; }
        .magic-e { border-color: #BDBDBD; color: #9E9E9E; border-style: dashed; background-color: #F5F5F5; opacity: 0.8; font-size: 1.8rem; }

        .icon-btn { cursor: pointer; font-size: 1.8rem; user-select: none; }
        .icon-btn:hover { transform: scale(1.15); }

        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <h1>🎈 신나는 파닉스 놀이 🖍️</h1>
    <div class="container">
        <input type="text" id="wordInput" placeholder="단어를 입력하세요 (예: cake kite)">
        <button class="btn-main" onclick="readPhonics()">마법의 파닉스 분리! ✨</button>
        <div id="resultArea" class="result-area"></div>
    </div>

    <script>
        function readPhonics() {
            const input = document.getElementById('wordInput').value.trim();
            const resultArea = document.getElementById('resultArea');
            resultArea.innerHTML = '';

            const words = input.split(/\s+/);
            words.forEach(word => {
                const cleanWord = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
                if (cleanWord) resultArea.appendChild(createWordCard(cleanWord));
            });
        }

        function createWordCard(word) {
            const wrapper = document.createElement('div');
            wrapper.className = 'word-wrapper';
            const card = document.createElement('div');
            card.className = 'word-card';

            const regex = /(igh|tch|dge)|(ar|er|ir|or|ur)|(ee|ea|ai|ay|oa|ow|ou|oo|oi|oy|au|aw|ew)|(sh|ch|th|wh|ph|ck|ng|qu)|([aeiou])|([^aeiou])/g;
            let match, tokens = [];
            while ((match = regex.exec(word)) !== null) {
                tokens.push({
                    text: match[0],
                    type: match[1] ? 'trigraph' : match[2] ? 'bossy-r' : match[3] ? 'vowel-team' : match[4] ? 'digraph' : match[5] ? 'vowel' : 'consonant',
                    el: null // 추후 생성될 DOM 요소를 담을 곳
                });
            }

            // 매직 e 판별: 마지막 글자가 e이고, 그 앞이 자음이면 매직 e로 처리
            if (tokens.length >= 3 && tokens[tokens.length-1].text === 'e' && tokens[tokens.length-2].type === 'consonant') {
                tokens[tokens.length-1].type = 'magic-e';
            }

            tokens.forEach((token) => {
                const span = document.createElement('span');
                span.className = 'phoneme ' + token.type;
                span.textContent = token.text;
                token.el = span; // DOM 저장
                card.appendChild(span);
            });

            card.onclick = () => speakWhole(word);
            wrapper.appendChild(card);

            // innerHTML += 대신 createElement/appendChild 사용
            // (innerHTML += 는 기존 card DOM을 통째로 재생성해버려서
            //  아치 그리기에 쓰인 token.el 참조가 끊어지는 문제가 있었음)
            const speakerBtn = document.createElement('div');
            speakerBtn.className = 'icon-btn';
            speakerBtn.textContent = '🔊';
            speakerBtn.onclick = () => speakWhole(word);
            wrapper.appendChild(speakerBtn);

            return wrapper;
        }

        function speakWhole(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.55; // 읽기 속도를 늦춤 (기본 1, 이전 0.8 -> 0.55)
            u.pitch = 1;
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
